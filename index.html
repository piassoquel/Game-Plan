<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f1316">
  <meta name="description" content="GamePlan delivery and installation operations app">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./css/app.css?v=0.4.0">
  <title>GamePlan</title>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand">
        <img src="./assets/logo/gameplan-logo.svg" alt="">
        <div>
          <b>Game<span>Plan</span></b>
          <small>Delivery & Installation</small>
        </div>
      </div>

      <nav>
        <button class="nav active" data-route="today">⌂ <span>Today's GamePlan</span></button>
        <button class="nav" data-route="schedule">▣ <span>Schedule</span></button>
        <button class="nav" data-route="jobs">☷ <span>Jobs</span></button>
        <button class="nav" data-route="roster">◎ <span>Roster</span></button>
        <button class="nav" data-route="more">••• <span>More</span></button>
      </nav>

      <div class="profile">
        <i>J</i>
        <div><b>James</b><small>Administrator</small></div>
      </div>
    </aside>

    <main>
      <header>
        <div>
          <h1 id="title">Today's GamePlan</h1>
          <p id="subtitle"></p>
        </div>
        <span class="demo" id="dataStatus">Loading…</span>
      </header>

      <section id="view"></section>
    </main>

    <nav class="bottom">
      <button class="active" data-route="today">⌂<small>Today</small></button>
      <button data-route="schedule">▣<small>Schedule</small></button>
      <button data-route="jobs">☷<small>Jobs</small></button>
      <button data-route="roster">◎<small>Roster</small></button>
      <button data-route="more">•••<small>More</small></button>
    </nav>

    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <aside class="drawer" id="jobDrawer" aria-hidden="true">
      <div class="drawer__header">
        <button class="drawer__back" id="closeDrawer" aria-label="Close job details">←</button>
        <strong>Job Details</strong>
        <button class="drawer__more" aria-label="More options">•••</button>
      </div>
      <div id="drawerContent" class="drawer__content"></div>
    </aside>


    <div class="wizard-backdrop" id="wizardBackdrop"></div>
    <section class="wizard" id="jobWizard" aria-hidden="true">
      <header class="wizard__header">
        <button class="drawer__back" id="closeWizard" aria-label="Close new job">×</button>
        <div><strong id="wizardTitle">New Job</strong><small id="wizardStepLabel">Step 1 of 5</small></div>
        <button class="text-button" id="saveDraftTop">Save & Finish Later</button>
      </header>
      <div class="wizard__progress" id="wizardProgress"></div>
      <form id="jobWizardForm" class="wizard__body"></form>
      <footer class="wizard__footer">
        <button type="button" class="button neutral" id="wizardBack">Back</button>
        <button type="button" class="button" id="wizardNext">Continue</button>
      </footer>
    </section>

    <div id="toast"></div>
  </div>

  <script src="./js/config.js?v=0.4.0"></script>
  <script type="module" src="./js/app.js?v=0.4.0"></script>
</body>
</html>
